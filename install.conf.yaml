- defaults:
    link:
      relink: true
      create: true

- clean: ["~"]

- link:
    # cross-platform config
    ~/.bashrc: bash/.bashrc
    ~/.gitconfig: git/.gitconfig
    ~/.tmux.conf: tmux/.tmux.conf

    ~/.config/alacritty:
      glob: true
      path: alacritty/*

    ~/.config/atuin:
      glob: true
      path: atuin/*

    ~/.config/fish:
      glob: true
      path: fish/*

    ~/.config/nvim:
      glob: true
      path: nvim/*

    # macos specific config
    ~/.config/aerospace:
      if: "[ $(uname) = Darwin ]"
      glob: true
      path: aerospace/*

    ~/.config/karabiner/karabiner.json:
      if: "[ $(uname) = Darwin ]"
      force: true
      path: karabiner/karabiner.json

    # linux specific config
    ~/.config/fuzzel/fuzzel.ini:
      if: "[ $(uname) = Linux ]"
      path: fuzzel/fuzzel.ini

# os specific font config
- link:
    ~/.config/alacritty/fonts.toml:
      if: "[ $(uname) = Darwin ]"
      path: alacritty/fonts-macos.toml

- link:
    ~/.config/alacritty/fonts.toml:
      if: "[ $(uname) = Linux ]"
      path: alacritty/fonts-linux.toml

- shell:
    - command: '[ "$SHELL" = "$(which fish)" ] || chsh -s $(which fish)'
      stdin: true
      stdout: true
      stderr: true
